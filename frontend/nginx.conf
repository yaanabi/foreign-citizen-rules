server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Запросы к /api/v1/* проксируются в контейнер backend.
    # Так фронт ходит на свой же origin и CORS не нужен.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Прокси на Swagger для удобства разработки (опционально).
    location /swagger/ {
        proxy_pass         http://backend:8080/swagger/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Статика и обычные страницы.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # В разработке HTML/CSS/JS часто меняются, поэтому не держим старые модули в кеше.
    location /assets/ {
        expires off;
        add_header Cache-Control "no-store";
    }
}
